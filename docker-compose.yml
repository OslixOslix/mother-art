# Только для локальной разработки. Railway собирает и запускает Dockerfile напрямую, без compose.
services:
  app:
    build: .
    container_name: mother-art-app
    ports:
      - "80:8000"
    volumes:
      - .:/app
    environment:
      APP_URL: http://localhost
    restart: unless-stopped

  queue:
    build: .
    container_name: mother-art-queue
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=600
    volumes:
      - .:/app
    depends_on:
      - app
    restart: unless-stopped
